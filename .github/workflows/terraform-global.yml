name: Last Terraform Apply

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

# Shared env vars injected into every job
env:
  TF_VAR_s3_bucket_name:   ${{ secrets.S3_BUCKET_NAME }}
  TF_VAR_domain_name:    ${{ secrets.DOMAIN_NAME }}

jobs:

  # ════════════════════════════════════════════════════════════
  # APPLY ALL
  # ════════════════════════════════════════════════════════════

  last-apply-all:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/setup-kubectl@v4
      - name: Apply-Plan
        run: |
          cd route53
          terraform init -reconfigure
          if [ "${{ github.event.inputs.action }}" = "apply" ]; then
            terraform apply -auto-approve
          else
            terraform plan
          fi
      - name: Update kubeconfig
        if: github.event.inputs.action == 'apply'
        run: aws eks update-kubeconfig --region ap-southeast-2 --name thumbnail-eks
      - name: Annotate ingress with certificate ARN
        if: github.event.inputs.action == 'apply'
        run: |
          cd route53
          CERT_ARN=$(terraform output -raw certificate_arn)
          kubectl annotate ingress thumbnail-ingress -n thumbnail \
            alb.ingress.kubernetes.io/certificate-arn=$CERT_ARN \
            alb.ingress.kubernetes.io/listen-ports='[{"HTTP":80},{"HTTPS":443}]' \
            alb.ingress.kubernetes.io/ssl-redirect='443' \
            --overwrite
