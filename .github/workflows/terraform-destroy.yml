name: Destroy infrastructure

on:
  workflow_dispatch:
# Shared env vars injected into every job
env:
  TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
  TF_VAR_domain_name:    ${{ secrets.DOMAIN_NAME }}

jobs:

  # ════════════════════════════════════════════════════════════
  # DESTROY ALL
  # ════════════════════════════════════════════════════════════

  destroy-all:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name thumbnail-eks --region ap-southeast-2 || true

      - name: Detach certificate from ingress
        run: |
          kubectl annotate ingress thumbnail-ingress -n thumbnail \
            alb.ingress.kubernetes.io/certificate-arn- \
            alb.ingress.kubernetes.io/listen-ports- \
            alb.ingress.kubernetes.io/ssl-redirect- \
            --ignore-not-found 2>/dev/null || true
          echo "Waiting 30s for ALB to drop HTTPS listener..."
          sleep 30

      - name: Delete K8s resources and wait for ALB controller cleanup
        run: |
          kubectl delete deployment --all -n thumbnail --ignore-not-found 2>/dev/null || true
          kubectl delete service --all -n thumbnail --ignore-not-found 2>/dev/null || true
          kubectl delete ingress --all -n thumbnail --ignore-not-found 2>/dev/null || true
          echo "Waiting for ALB controller to clean up ALB and security groups..."
          for i in $(seq 1 40); do
            COUNT=$(aws elbv2 describe-load-balancers \
              --query "length(LoadBalancers[?contains(LoadBalancerName,'thumbnai')])" \
              --output text 2>/dev/null || echo "0")
            [ "$COUNT" = "0" ] && echo "ALB gone." && break
            echo "ALB still present, waiting... ($i/40)"
            sleep 15
          done
          ALB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName,'thumbnai')].LoadBalancerArn" \
            --output text 2>/dev/null || true)
          if [ -n "$ALB_ARNS" ]; then
            echo "ALB controller did not clean up — force-deleting..."
            for ARN in $ALB_ARNS; do
              aws elbv2 delete-load-balancer --load-balancer-arn "$ARN" || true
            done
            sleep 30
            echo "Force-deleted ALB — cleaning up orphaned security groups..."
            VPC_ID=$(aws ec2 describe-vpcs \
              --filters "Name=tag:Name,Values=thumbnail-vpc" \
              --query "Vpcs[0].VpcId" --output text 2>/dev/null || true)
            if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
              SG_IDS=$(aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=k8s-*" \
                --query "SecurityGroups[].GroupId" --output text 2>/dev/null || true)
              for SG_ID in $SG_IDS; do
                echo "Removing rules from $SG_ID..."
                INGRESS=$(aws ec2 describe-security-groups --group-ids "$SG_ID" \
                  --query 'SecurityGroups[0].IpPermissions' --output json 2>/dev/null || echo "[]")
                EGRESS=$(aws ec2 describe-security-groups --group-ids "$SG_ID" \
                  --query 'SecurityGroups[0].IpPermissionsEgress' --output json 2>/dev/null || echo "[]")
                [ "$INGRESS" != "[]" ] && aws ec2 revoke-security-group-ingress \
                  --group-id "$SG_ID" --ip-permissions "$INGRESS" 2>/dev/null || true
                [ "$EGRESS" != "[]" ] && aws ec2 revoke-security-group-egress \
                  --group-id "$SG_ID" --ip-permissions "$EGRESS" 2>/dev/null || true
                echo "Deleting $SG_ID..."
                aws ec2 delete-security-group --group-id "$SG_ID" 2>/dev/null || true
              done
            fi
          fi

      - name: Destroy Monitoring
        run: |
          cd terraform-monitoring
          terraform init -reconfigure
          terraform destroy -auto-approve -refresh=false -var="endpoint=${{ secrets.ALERT_EMAIL }}" || true

      - name: Destroy Route53
        run: |
          cd route53
          terraform init -reconfigure
          terraform destroy -auto-approve -refresh=false || true

      - name: Destroy Infrastructure
        run: |
          cd terraform
          terraform init -reconfigure
          terraform state rm 'module.ecr.aws_ecr_repository.worker' 2>/dev/null || true
          terraform state rm 'module.ecr.aws_ecr_repository.frontend' 2>/dev/null || true
          terraform state rm 'module.ecr.aws_ecr_repository.api' 2>/dev/null || true
          terraform destroy -auto-approve -refresh=false
