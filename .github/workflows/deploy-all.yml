name: Deploy All

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase 1 = infra + build + k8s + route53 step1 | Phase 2 = route53 step2 + monitoring'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
      image_tag:
        description: 'Image tag e.g. 1.3.0 (required for Phase 1)'
        required: false
        default: ''

env:
  TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
  TF_VAR_domain_name:    ${{ secrets.DOMAIN_NAME }}

jobs:

  # ════════════════════════════════════════════════════════════
  # PHASE 1 — parallel: infra + builds + route53 step1
  # ════════════════════════════════════════════════════════════

  terraform-infra:
    if: github.event.inputs.phase == '1'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply — Infrastructure
        run: |
          cd terraform
          terraform init -reconfigure
          terraform apply -auto-approve

  build-images:
    if: github.event.inputs.phase == '1'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - service: frontend
            build_path: frontend
          - service: worker
            build_path: worker
          - service: api
            build_path: api
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push ${{ matrix.service }}
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          if [ -z "$TAG" ]; then echo "ERROR: image_tag is required for Phase 1" && exit 1; fi
          if [ "${{ matrix.service }}" = "frontend" ]; then ECR=${{ secrets.ECR_BASE_FRONTEND }}; fi
          if [ "${{ matrix.service }}" = "worker" ];   then ECR=${{ secrets.ECR_BASE_WORKER }};   fi
          if [ "${{ matrix.service }}" = "api" ];      then ECR=${{ secrets.ECR_BASE_API }};      fi
          docker build -t $ECR:$TAG ./${{ matrix.build_path }}
          docker push $ECR:$TAG

  route53-step1:
    if: github.event.inputs.phase == '1'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - name: Route53 — Zone + Cert + NS records
        run: |
          cd route53
          terraform init -reconfigure
          terraform apply -auto-approve \
            -target=aws_route53_zone.main \
            -target=aws_acm_certificate.cert \
            -target=aws_route53_record.cert_validation
          echo "========================================"
          echo "Set these NS records in Namecheap, then run Phase 2:"
          echo "========================================"
          terraform output name_servers

  # ════════════════════════════════════════════════════════════
  # PHASE 1 — sequential: deploy k8s (after infra + builds)
  # ════════════════════════════════════════════════════════════

  deploy-k8s:
    if: github.event.inputs.phase == '1'
    needs: [terraform-infra, build-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - uses: azure/setup-kubectl@v4

      - name: Terraform Init
        run: cd terraform && terraform init -reconfigure

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name thumbnail-eks --region ap-southeast-2

      - name: Patch CoreDNS for Fargate
        run: |
          kubectl patch deployment coredns -n kube-system --type json \
            -p='[{"op":"remove","path":"/spec/template/metadata/annotations/eks.amazonaws.com~1compute-type"}]' \
            2>/dev/null || true
          kubectl rollout restart deployment/coredns -n kube-system
          echo "Waiting for CoreDNS pods to be ready..."
          for i in $(seq 1 30); do
            READY=$(kubectl get deployment coredns -n kube-system \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null); READY=${READY:-0}
            DESIRED=$(kubectl get deployment coredns -n kube-system \
              -o jsonpath='{.spec.replicas}' 2>/dev/null); DESIRED=${DESIRED:-2}
            echo "CoreDNS ready: $READY/$DESIRED"
            [ "$READY" = "$DESIRED" ] && echo "CoreDNS is ready." && break
            sleep 15
          done

      - name: Annotate KEDA service account with IAM role
        run: |
          KEDA_ROLE_ARN=$(cd terraform && terraform output -raw keda_role_arn)
          kubectl create serviceaccount keda-operator -n kube-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl annotate serviceaccount keda-operator -n kube-system \
            eks.amazonaws.com/role-arn=$KEDA_ROLE_ARN \
            meta.helm.sh/release-name=keda \
            meta.helm.sh/release-namespace=kube-system \
            --overwrite
          kubectl label serviceaccount keda-operator -n kube-system \
            app.kubernetes.io/managed-by=Helm \
            --overwrite

      - name: Install KEDA
        run: cd scripts && chmod +x deploy-keda.sh && ./deploy-keda.sh

      - name: Install ALB Controller
        run: cd scripts && chmod +x deploy-aws-lb.sh && ./deploy-aws-lb.sh

      - name: Deploy K8s manifests
        run: cd scripts && chmod +x deploy-k8s.sh && ./deploy-k8s.sh

  # ════════════════════════════════════════════════════════════
  # PHASE 2 — Route53 step 2 + Monitoring
  # (run after NS records are set in Namecheap)
  # ════════════════════════════════════════════════════════════

  phase-2:
    if: github.event.inputs.phase == '2'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/setup-kubectl@v4

      - name: Route53 — Cert validation + A record
        run: |
          cd route53
          terraform init -reconfigure
          terraform apply -auto-approve

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name thumbnail-eks --region ap-southeast-2

      - name: Annotate ingress with certificate ARN
        run: |
          cd route53
          CERT_ARN=$(terraform output -raw certificate_arn)
          kubectl annotate ingress thumbnail-ingress -n thumbnail \
            alb.ingress.kubernetes.io/certificate-arn=$CERT_ARN \
            alb.ingress.kubernetes.io/listen-ports='[{"HTTP":80},{"HTTPS":443}]' \
            alb.ingress.kubernetes.io/ssl-redirect='443' \
            --overwrite

      - name: Terraform Apply — Monitoring
        run: |
          cd terraform-monitoring
          terraform init -reconfigure
          terraform apply -auto-approve -var="endpoint=${{ secrets.ALERT_EMAIL }}"
