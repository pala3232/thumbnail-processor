name: Deploy K8s

on:
  workflow_dispatch:

env:
  TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}

jobs:

  # ════════════════════════════════════════════════════════════
  # DEPLOY CLUSTER
  # ════════════════════════════════════════════════════════════

  deploy-k8s:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - uses: azure/setup-kubectl@v4

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name thumbnail-eks --region ap-southeast-2

      - name: Patch CoreDNS for Fargate
        run: |
          kubectl patch deployment coredns -n kube-system --type json \
            -p='[{"op":"remove","path":"/spec/template/metadata/annotations/eks.amazonaws.com~1compute-type"}]' \
            2>/dev/null || true
          kubectl rollout status deployment/coredns -n kube-system --timeout=120s

      - name: Install KEDA
        run: |
          cd scripts
          chmod +x deploy-keda.sh
          ./deploy-keda.sh

      - name: Annotate KEDA service account with IAM role
        run: |
          KEDA_ROLE_ARN=$(cd terraform && terraform output -raw keda_role_arn)
          kubectl annotate serviceaccount keda-operator -n kube-system \
            eks.amazonaws.com/role-arn=$KEDA_ROLE_ARN \
            --overwrite

      - name: Install ALB Controller
        run: |
          cd scripts
          chmod +x deploy-aws-lb.sh
          ./deploy-aws-lb.sh

      - name: Deploy K8s manifests
        run: |
          cd scripts
          chmod +x deploy-k8s.sh
          ./deploy-k8s.sh
