apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thumbnail-ingress
  namespace: thumbnail
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip          # REQUIRED for Fargate — routes to pod IPs directly
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: thumbnail-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: thumbnail-frontend
            port:
              number: 3000