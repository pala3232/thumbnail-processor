apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: thumbnail
  labels:
    app: thumbnail-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thumbnail-worker
  template:
    metadata:
      labels:
        app: thumbnail-worker
    spec:
      serviceAccountName: thumbnail-worker-sa
      containers:
      - name: worker
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/thumbnail-worker
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command:
            - pgrep
            - "-f"
            - main.py
          initialDelaySeconds: 10
          periodSeconds: 30
        envFrom:
        - configMapRef:
            name: worker-config
