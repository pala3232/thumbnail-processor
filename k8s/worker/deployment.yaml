apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: thumbnail
  labels:
    app: thumbnail-worker
spec:
  selector:
    matchLabels:
      app: thumbnail-worker
  template:
    metadata:
      labels:
        app: thumbnail-worker
    spec:
      serviceAccountName: thumbnail-worker-sa
      containers:
      - name: worker
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/thumbnail-worker:1.2.0
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command:
            - python3
            - "-c"
            - |
              import os, sys
              found = any(
                b'main.py' in open(f'/proc/{p}/cmdline', 'rb').read()
                for p in os.listdir('/proc') if p.isdigit()
              )
              sys.exit(0 if found else 1)
          initialDelaySeconds: 10
          periodSeconds: 15
        envFrom:
        - configMapRef:
            name: worker-config
