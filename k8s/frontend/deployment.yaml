apiVersion: apps/v1
kind: Deployment
metadata:
  name: thumbnail-frontend
  namespace: thumbnail
  labels:
    app: thumbnail-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thumbnail-frontend
  template:
    metadata:
      labels:
        app: thumbnail-frontend
    spec:
      serviceAccountName: thumbnail-frontend-sa
      containers:
      - name: frontend
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/thumbnail-frontend:1.1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
        env:
        - name: API_BASE_URL
          value: "http://thumbnail-api:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: thumbnail-frontend
  namespace: thumbnail
  labels:
    app: thumbnail-frontend
spec:
  selector:
    app: thumbnail-frontend
  ports:
  - name: http
    protocol: TCP
    port: 3000
    targetPort: 3000